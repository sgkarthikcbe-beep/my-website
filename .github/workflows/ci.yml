name: CI — Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Validate HTML structure
        run: |
          echo "🔍 Checking index.html exists and is non-empty..."
          test -f index.html && test -s index.html && echo "✅ index.html OK" || (echo "❌ index.html missing or empty" && exit 1)

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./
          publish_branch: gh-pages
          commit_message: "🚀 Auto-deploy: ${{ github.sha }}"
